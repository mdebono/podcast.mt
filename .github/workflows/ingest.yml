name: RSS Ingestion & Deploy

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Also run on pushes to main (e.g. when you edit shows.json)
  push:
    branches:
      - main
    paths:
      - 'data/shows.json'        # new/updated show entries
      - 'scripts/ingest.js'      # script changes
      - 'src/**'                 # site source changes

jobs:
  ingest-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RSS ingestion
        run: node scripts/ingest.js

      - name: Show ingestion summary
        run: cat data/ingest-summary.json

      # Commit updated episodes.json and shows-enriched.json back to the repo
      # so the build always has fresh data even if Vercel deploy hook fails
      - name: Commit ingested data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh RSS data [skip ci]'
          file_pattern: |
            data/episodes.json
            data/shows-enriched.json
            data/ingest-summary.json
          commit_user_name: 'podcast-mt-bot'
          commit_user_email: 'bot@podcast.mt'

      # Trigger a Vercel deployment via deploy hook
      # Add your hook URL as a secret: Settings → Secrets → VERCEL_DEPLOY_HOOK
      - name: Trigger Vercel deploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          echo "Triggering Vercel deploy…"
          curl -s -o /dev/null -w "HTTP %{http_code}" -X POST "$VERCEL_DEPLOY_HOOK"
          echo ""

      # Optional: notify you on Slack/email if there were feed errors
      - name: Check for errors
        run: |
          ERRORS=$(node -e "
            const s = require('./data/ingest-summary.json');
            console.log(s.errorCount);
          ")
          if [ "$ERRORS" -gt "0" ]; then
            echo "::warning::$ERRORS feed(s) failed to ingest. Check ingest-summary.json."
          fi
